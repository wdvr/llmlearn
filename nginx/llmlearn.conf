# Nginx configuration for llmlearn on n100w
# Add this as a Proxy Host in Nginx Proxy Manager on n100w
# Domain: llm.thelittleone.rocks
# Forward to: http://localhost:3080

server {
    listen 3080;
    root /home/wouter/llmlearn/public;
    index index.html;

    # Serve static files and SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets with long expiration
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static resources
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Prevent caching of index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
