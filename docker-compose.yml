services:
  llmlearn:
    build: .
    container_name: llmlearn
    restart: unless-stopped
    ports:
      - "3080:3001"  # host:container — NPM uses container port 3001 directly via Docker network
    volumes:
      # Mount host claude config so claude -p works in container
      - /home/wouter/.claude:/root/.claude:ro
      - /home/wouter/.config/claude:/root/.config/claude:ro
    environment:
      - PORT=3001
    networks:
      - npm

networks:
  npm:
    external: true
    name: opt_default
