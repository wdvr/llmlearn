services:
  llmlearn:
    build: .
    container_name: llmlearn
    restart: unless-stopped
    ports:
      - "3080:3001"
    volumes:
      # Mount claude auth from host
      - /home/wouter/.claude:/root/.claude
      # Persistent progress DB (SQLite). Survives container rebuilds.
      - /home/wouter/llmlearn-data:/data
      # AWS creds for SES login-notification emails (read-only).
      - /home/wouter/.aws:/root/.aws:ro
    environment:
      - PORT=3001
      - LLMLEARN_DATA_DIR=/data
      # Login-notification email via AWS SES. NOTIFY_EMAIL is required to
      # enable emails; SES_FROM must be on a verified domain (wdvr.dev is
      # verified). AWS creds come from the mounted ~/.aws above.
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
      - SES_FROM=${SES_FROM:-llmlearn@wdvr.dev}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    networks:
      - npm

networks:
  npm:
    external: true
    name: opt_default
