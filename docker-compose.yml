services:
  llmlearn:
    build: .
    container_name: llmlearn
    restart: unless-stopped
    ports:
      - "3080:3001"
    volumes:
      # Mount claude auth from host
      - /home/wouter/.claude:/root/.claude
      # Persistent progress DB (SQLite). Survives container rebuilds.
      - /home/wouter/llmlearn-data:/data
    environment:
      - PORT=3001
      - LLMLEARN_DATA_DIR=/data
      # Login-notification email (optional). Put real values in /home/wouter/llmlearn/.env
      # to email NOTIFY_EMAIL on the first sign-in by each new user. When
      # unset, sign-ins are still recorded to /data/logins.log.
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    networks:
      - npm

networks:
  npm:
    external: true
    name: opt_default
