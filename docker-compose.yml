services:
  llmlearn:
    build: .
    container_name: llmlearn
    restart: unless-stopped
    ports:
      - "3080:3001"
    volumes:
      # Mount claude auth from host
      - /home/wouter/.claude:/root/.claude
    environment:
      - PORT=3001
    networks:
      - npm

networks:
  npm:
    external: true
    name: opt_default
