name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.thelittleone.rocks
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            docker.thelittleone.rocks/llmlearn:${{ github.sha }}
            docker.thelittleone.rocks/llmlearn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to n100w
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.N100W_HOST }}
          username: wouter
          key: ${{ secrets.N100W_SSH_KEY }}
          script: |
            cd ~/llmlearn
            docker pull docker.thelittleone.rocks/llmlearn:latest
            docker compose up -d --force-recreate
            docker image prune -f
